name: Claude PR review

# Automated, independent review pass on every PR. Since AI is also producing
# these PRs, this closes the loop. Posts inline comments only — never approves
# or merges. Gated on ENABLE_CLAUDE_AUTOMATION so it stays inert (skipped, not
# failed) until setup is complete. See docs/agents/ai-automation.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    if: vars.ENABLE_CLAUDE_AUTOMATION == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # PRs opened by the implement workflow are authored by the claude bot;
          # allow that specific bot (not '*') so its PRs still get reviewed.
          allowed_bots: claude
          # Review mode: posts/updates a tracking comment on the PR (also gives
          # live visibility into the review's progress).
          track_progress: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This repo is an Elixir Ash extension that generates a Swift client
            (AshSwift). Read CLAUDE.md, CONTEXT.md, docs/adr/, and docs/prd/ first.

            Prioritise correctness bugs, then reuse/simplification/efficiency.
            Use the domain vocabulary defined in CONTEXT.md and flag any conflicts
            with an ADR explicitly. Confirm the change stays within its issue's
            scope and that the codegen output stays deterministic.

            Post findings as precise, actionable inline review comments. Do not
            approve, merge, or push commits.
          # Pin the model (the action's default resolves to an invalid
          # `claude-opus-4-8[1m]` id). See claude.yml for rationale.
          # Allow the tools a reviewer needs: the inline-comment MCP tool, gh for
          # the diff/PR + top-level comments, and file reads for the repo docs the
          # prompt references. Without these the reviewer is denied every tool and
          # burns its turns (error_max_turns).
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
