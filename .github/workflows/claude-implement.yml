name: Claude implement issue

# AFK issue pickup: manually dispatch with an issue number and Claude implements
# that issue on a branch, runs the suite until green, and opens a PR. This is a
# starting point — keep the human review gate (the PR) and refine the prompt as
# you learn what the agent gets wrong. See docs/agents/ai-automation.md.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement (must be ready-for-agent)"
        required: true
        type: string

jobs:
  implement:
    if: vars.ENABLE_CLAUDE_AUTOMATION == 'true'
    # macOS so the agent can actually run the suite (mix test shells to swift
    # build; swift test needs the toolchain). Matches CI.
    runs-on: macos-latest
    # Safety cap: a stuck or runaway run self-kills instead of burning macOS
    # minutes + subscription quota up to the 6h default. Generous headroom for a
    # real implement+test loop.
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the toolchains up front so the agent's `mix test` / `swift test`
      # actually run (Swift ships with Xcode on macOS runners).
      - name: Install Elixir/Erlang
        run: brew install elixir
      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force
      - name: Fetch deps
        run: mix deps.get

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stream the full turn-by-turn execution into the run log so we can
          # see exactly what the agent is doing (and where it stops). Drop once
          # we trust the runs.
          show_full_output: true
          prompt: |
            Implement GitHub issue #${{ inputs.issue_number }} in ${{ github.repository }}.

            Use the `/implement` skill to structure your work, and `/tdd` for the
            red-green-refactor loop (both are in this repo's .claude/skills/).

            1. Read it: `gh issue view ${{ inputs.issue_number }}`.
            2. Follow this repo's conventions: CLAUDE.md, CONTEXT.md, docs/adr/,
               docs/prd/m1-vertical-slice.md. Read `docs/agents/lessons.md` —
               it captures non-obvious patterns earlier runs got wrong. Use the
               domain vocabulary in CONTEXT.md.
            3. Scope strictly to this issue's acceptance criteria — do not pull in
               later-milestone work. Work test-first where there is a natural seam.
            4. Before committing, make every gate CI runs pass locally, in this
               order: `mix format` (CI enforces `mix format --check-formatted`),
               `mix compile --warnings-as-errors`, `mix test`, and `swift test`.
               Keep generated codegen output deterministic. Do not open the PR
               until all four are green.
            5. Create a branch `issue-${{ inputs.issue_number }}-<short-slug>`, commit,
               push, and open a PR whose body starts with
               "Closes #${{ inputs.issue_number }}". Do NOT merge — leave it for review.
            6. Reflect: did you hit a pattern future agents would also miss?
               Only if you can name a NON-OBVIOUS, RECURRING pattern that is
               NOT already in `docs/agents/lessons.md`, append a short entry
               (≤2 paragraphs, link an issue/PR) under the appropriate section
               and include the doc change in your PR. If unsure, do nothing.
               Most runs add no entry; noise is worse than missing a lesson.
          # Unlike tag mode (read-only + git), an implementer needs to run the
          # build/test toolchain, edit files, and use git/gh. Grant an explicit
          # tool allowlist (auditable, and scoped to this dispatch-only,
          # write-access-gated workflow) rather than bypassing permissions.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 80
            --verbose
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,NotebookEdit,Glob,Grep,LS,TodoWrite,Skill"
