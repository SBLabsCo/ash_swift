name: Claude (@claude)

# Interactive "tag mode": mention @claude in an issue/PR comment, a PR review,
# or a new issue, and Claude responds in context. See docs/agents/ai-automation.md
# for the one-time setup (install the Claude GitHub App + add ANTHROPIC_API_KEY,
# then set the ENABLE_CLAUDE_AUTOMATION repo variable to "true").

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run once enabled, and only when @claude is actually mentioned — so we
    # don't spend runner minutes on every comment.
    if: |
      vars.ENABLE_CLAUDE_AUTOMATION == 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pin the model: the action's default resolves to an invalid
          # `claude-opus-4-8[1m]` id that the API rejects. Sonnet 4.6 is a
          # capable, cost-appropriate default; bump to claude-opus-4-8 if wanted.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
