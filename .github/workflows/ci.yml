name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir + Swift
    # macOS so a single job can run both the Elixir suite (which shells out to
    # `swift build` via the codegen compile harness) and the Swift runtime
    # tests — and so the Swift client is built on an Apple platform, which is
    # what it actually targets. Swift ships with Xcode on macOS runners.
    runs-on: macos-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Install Elixir/Erlang
        run: brew install elixir

      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Fetch deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Elixir tests (includes the Swift compile harness)
        run: mix test

      - name: Swift runtime tests
        run: swift test
